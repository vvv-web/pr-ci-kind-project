name: pr-ci-kind

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read
  contents: write  # для deterministic publish (git push) при исправлении Cursor Agent

jobs:
  pr-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.31.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind --version

      - name: Create cluster
        run: |
          kind create cluster --name pr-ci --wait 2m

      - name: Mock tests
        run: |
          chmod +x tests/*.sh || true
          ./tests/mock_test.sh

      - name: Build image
        run: |
          docker build -t local/app:pr-${{ github.sha }} ./app

      - name: Load image into kind
        run: |
          kind load docker-image local/app:pr-${{ github.sha }} --name pr-ci

      - name: Deploy to Kubernetes
        run: |
          sed -i "s|image: local/app:dev|image: local/app:pr-${{ github.sha }}|" k8s/deployment.yaml
          kubectl apply -f k8s/

      - name: Smoke tests
        run: |
          chmod +x tests/smoke_test.sh
          ./tests/smoke_test.sh

      - name: Export kind logs
        if: always()
        run: |
          kind export logs ./kind-logs --name pr-ci || true
          ls -la kind-logs/ 2>/dev/null || true

      - name: Upload kind logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kind-logs
          path: kind-logs/

      - name: Delete cluster
        if: always()
        run: |
          kind delete cluster --name pr-ci || true

      # --- Cursor Agent restricted mode (только при падении pipeline) ---
      - name: Install Cursor CLI
        if: failure()
        run: |
          curl -fsS https://cursor.com/install | bash
          echo "$HOME/.cursor/bin" >> $GITHUB_PATH
          echo "$HOME/.cursor/bin" >> $GITHUB_ENV

      - name: Cursor Agent restricted fix
        if: failure()
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          export PATH="$HOME/.cursor/bin:$PATH"
          agent -p "IMPORTANT: Do NOT create branches, commit, push, or post PR comments.
          Only modify files in the working directory.
          Analyze the CI failure (check logs above).
          Fix tests, Kubernetes manifests, or app code as needed.
          Focus on CI-safe fixes only.
          " --model gpt-5.2

      - name: Commit deterministic fixes
        if: failure()
        run: |
          if ! git diff --quiet; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add -A
            git commit -m "ci: cursor restricted fixes"
            git push
          fi
